# ============================================
# 🎌 AniData Lab — Grafana Configuration
# ============================================

[security]
admin_user = admin
admin_password = anidata
allow_sign_up = false

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/anidata-overview.json

[date_formats]
default_timezone = browser
